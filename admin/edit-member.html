<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Edit Member | EL FLA7EN Admin</title>
  <link rel="stylesheet" href="../assets/css/main.css">
</head>
<body>
  <nav class="navbar">
    <a href="../index.html" class="nav-logo">EL_FLA7EN<span>://</span>ADMIN</a>
    <ul class="nav-links">
      <li><a href="panel.html">[ Panel ]</a></li>
      <li><a href="#" onclick="logout()" class="btn-login" style="background:var(--red);border-color:var(--red);">[LOGOUT]</a></li>
    </ul>
  </nav>

  <main style="max-width:700px;margin:0 auto;padding:100px 2rem 4rem;">
    <div style="margin-bottom:2rem;">
      <a href="panel.html" style="color:var(--text-dim);text-decoration:none;font-size:0.82rem;">&lt; Back to Panel</a>
    </div>
    <div style="font-family:var(--font-display);font-size:1.5rem;color:white;margin-bottom:0.5rem;">Edit <span style="color:var(--accent2);">Member</span></div>
    <p style="color:var(--text-dim);font-size:0.85rem;margin-bottom:2rem;">Edit Member Data</p>

    <div id="alertBox"></div>

    <div class="card" id="formContainer">
      <div style="text-align:center;padding:3rem;color:var(--text-dim);">
        <div class="loading-spinner"></div>
        <p style="margin-top:1rem;">Loading member data...</p>
      </div>
    </div>
  </main>

    <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="../assets/js/main.js"></script>
  <script>
    const session = getSession();
    if (!session || session.role !== 'admin') window.location.href = '../login.html';
    function logout() { clearSession(); window.location.href = '../index.html'; }

    const params = new URLSearchParams(window.location.search);
    const memberId = params.get('id');

    async function loadMember() {
      let member = null;
      try {
        if (memberId !== null) {
          const data = await getData(`members/${memberId}`);
          member = data || LOCAL_DATA.members[parseInt(memberId)] || LOCAL_DATA.members[0];
        }
      } catch (e) {
        member = LOCAL_DATA.members[0];
      }
      if (!member) member = LOCAL_DATA.members[0];
      renderForm(member);
    }

    function renderForm(m) {
      document.getElementById('formContainer').innerHTML = `
        <form id="editMemberForm">
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem;">
            <div class="form-group">
              <label class="form-label">Full Name *</label>
              <input type="text" class="form-input" id="name" value="${m.name || ''}" required>
            </div>
            <div class="form-group">
              <label class="form-label">Role *</label>
              <select class="form-select" id="role" required>
                ${['Team Leader','Web Security','Reverse Engineer','Cryptographer','Network Security','OSINT Analyst','Pwn Specialist','Forensics Expert','Mobile Security','Member'].map(r => `<option value="${r}" ${m.role === r ? 'selected' : ''}>${r}</option>`).join('')}
              </select>
            </div>
            <div class="form-group">
              <label class="form-label">Specialty</label>
              <input type="text" class="form-input" id="specialty" value="${m.specialty || ''}">
            </div>
            <div class="form-group">
              <label class="form-label">Join Date</label>
              <input type="date" class="form-input" id="joinDate" value="${m.joinDate || ''}">
            </div>
          </div>
          <div class="form-group">
            <label class="form-label">Bio</label>
            <textarea class="form-textarea" id="bio" rows="3">${m.bio || ''}</textarea>
          </div>
          <div class="form-group">
            <label class="form-label">Skills (comma-separated)</label>
            <input type="text" class="form-input" id="skills" value="${(m.skills || []).join(', ')}">
          </div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem;">
            <div class="form-group">
              <label class="form-label">LinkedIn URL</label>
              <input type="url" class="form-input" id="linkedin" value="${m.linkedin || ''}">
            </div>
            <div class="form-group">
              <label class="form-label">Email</label>
              <input type="email" class="form-input" id="email" value="${m.email || ''}">
            </div>
          </div>
          <div class="form-group">
            <label class="form-label">Status</label>
            <select class="form-select" id="active">
              <option value="true" ${m.active !== false ? 'selected' : ''}>Active</option>
              <option value="false" ${m.active === false ? 'selected' : ''}>Inactive</option>
            </select>
          </div>
          <div style="display:flex;gap:1rem;margin-top:1.5rem;">
            <a href="panel.html" class="btn btn-outline" style="flex:1;text-align:center;">&lt; Cancel</a>
            <button type="submit" class="btn btn-primary" style="flex:2;">&gt; Save Changes</button>
          </div>
        </form>
      `;

      document.getElementById('editMemberForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const updated = {
          name: document.getElementById('name').value,
          role: document.getElementById('role').value,
          specialty: document.getElementById('specialty').value,
          bio: document.getElementById('bio').value,
          skills: document.getElementById('skills').value.split(',').map(s => s.trim()).filter(Boolean),
          linkedin: document.getElementById('linkedin').value,
          email: document.getElementById('email').value,
          joinDate: document.getElementById('joinDate').value,
          active: document.getElementById('active').value === 'true',
          updatedAt: new Date().toISOString()
        };
        try {
          await setData(`members/${memberId}`, updated);
          document.getElementById('alertBox').innerHTML = '<div class="alert alert-success">[SUCCESS] Member updated! Redirecting...</div>';
          setTimeout(() => window.location.href = 'panel.html', 2000);
        } catch (err) {
          document.getElementById('alertBox').innerHTML = '<div class="alert alert-error">[ERROR] ' + err.message + '</div>';
        }
      });
    }

    loadMember();
  </script>
</body>
</html>
